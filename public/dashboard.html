<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAn1ip5ibEQsagBRaS0U0onKjFXtQMMZuc",
        authDomain: "berlin-wall-f05a8.firebaseapp.com",
        projectId: "berlin-wall-f05a8",
        storageBucket: "berlin-wall-f05a8.firebasestorage.app",
        messagingSenderId: "374515847282",
        appId: "1:374515847282:web:b052c0c218937fae7432eb"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // --- REAL-TIME LISTENER ---
    db.collection("student_progress").onSnapshot((snapshot) => {
        const tableBody = document.getElementById('dashboard-body');
        tableBody.innerHTML = ""; 

        snapshot.forEach((doc) => {
            const data = doc.data();
            
            // 1. Use the email field from the data
            const studentEmail = data.email || doc.id; 

            // 2. Use 'lastStep' for more detail (e.g., File 7 - Q4)
            // Fallback to lastSegmentID if lastStep is missing
            let progress = data.lastStep || data.lastSegmentID || "Starting...";
            let rowClass = "";
            
            if (progress.includes("finish") || progress.includes("10")) {
                progress = "ARCHIVE CLEAR ✅";
                rowClass = "complete";
            }

            // 3. Fix the Timestamp (Using your actual field: 'timestamp')
            let lastPing = "--:--:--";
            if (data.timestamp) {
                // Firebase timestamp objects have a .toDate() method
                const date = data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp);
                lastPing = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            // 4. Added a "Total Answered" column since you have that data!
            const totalQ = data.questionsAnswered || 0;

            const row = `
                <tr>
                    <td>${studentEmail}</td>
                    <td><span class="status-pill ${rowClass}">${progress}</span></td>
                    <td>${totalQ}</td>
                    <td class="timestamp">${lastPing}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    });
</script>
