<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Berlin Wall Progress Monitor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #1a1a1a; color: #00ff00; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #000; padding: 20px; border: 2px solid #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid #00ff00; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #00ff00; color: #00ff00; }
        td { padding: 12px; border-bottom: 1px solid #222; }
        .status-pill { border: 1px solid #00ff00; padding: 3px 10px; border-radius: 4px; font-size: 0.85em; }
        .complete { background: #00ff00; color: #000; font-weight: bold; }
        .timestamp { color: #888; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h2>Berlin Wall: Archive Access Logs</h2>
    <table>
        <thead>
            <tr>
                <th>Agent (Email)</th>
                <th>Current Step</th>
                <th>Total Qs</th>
                <th>Last Ping</th>
            </tr>
        </thead>
        <tbody id="dashboard-body">
            </tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAn1ip5ibEQsagBRaS0U0onKjFXtQMMZuc",
        authDomain: "berlin-wall-f05a8.firebaseapp.com",
        projectId: "berlin-wall-f05a8",
        storageBucket: "berlin-wall-f05a8.firebasestorage.app",
        messagingSenderId: "374515847282",
        appId: "1:374515847282:web:b052c0c218937fae7432eb"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    db.collection("student_progress").onSnapshot((snapshot) => {
        const tableBody = document.getElementById('dashboard-body');
        tableBody.innerHTML = ""; 

        snapshot.forEach((doc) => {
            const data = doc.data();
            const studentEmail = data.email || doc.id; 
            
            // Map to your specific fields: lastStep, questionsAnswered, and timestamp
            let progress = data.lastStep || data.lastSegmentID || "Initializing...";
            let qCount = data.questionsAnswered || 0;
            let rowClass = "";
            
            if (progress.toLowerCase().includes("finish") || progress.toLowerCase().includes("clear")) {
                progress = "ARCHIVE CLEAR ✅";
                rowClass = "complete";
            }

            let timeStr = "--:--:--";
            if (data.timestamp) {
                const date = data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp);
                timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }

            const row = `
                <tr>
                    <td>${studentEmail}</td>
                    <td><span class="status-pill ${rowClass}">${progress}</span></td>
                    <td>${qCount}</td>
                    <td class="timestamp">${timeStr}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }, (error) => {
        console.error("Firebase Error: ", error);
    });
</script>

</body>
</html>
