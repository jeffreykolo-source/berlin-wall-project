<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAn1ip5ibEQsagBRaS0U0onKjFXtQMMZuc",
        authDomain: "berlin-wall-f05a8.firebaseapp.com",
        projectId: "berlin-wall-f05a8",
        storageBucket: "berlin-wall-f05a8.firebasestorage.app",
        messagingSenderId: "374515847282",
        appId: "1:374515847282:web:b052c0c218937fae7432eb"
    };

    // Initialize Firebase only if it hasn't been initialized yet
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const db = firebase.firestore();

    // --- REAL-TIME LISTENER ---
    db.collection("student_progress").onSnapshot((snapshot) => {
        const tableBody = document.getElementById('dashboard-body');
        tableBody.innerHTML = ""; 

        snapshot.forEach((doc) => {
            const data = doc.data();
            
            // Use the Document Name (the email)
            const studentEmail = doc.id; 

            // Format the Progress
            let progress = "0";
            let rowClass = "";
            
            if (data.lastSegmentID) {
                progress = data.lastSegmentID.replace('segment-', '').toUpperCase();
                if (progress === "FINISH") {
                    progress = "ARCHIVE CLEAR ✅";
                    rowClass = "complete";
                } else {
                    progress = `FILE ${progress} / 10`;
                }
            }

            // Robust Timestamp formatting
            let lastPing = "--:--:--";
            if (data.lastActive) {
                // Handle Firebase timestamp vs standard JS date
                const date = data.lastActive.toDate ? data.lastActive.toDate() : new Date(data.lastActive);
                lastPing = date.toLocaleTimeString([], { hour12: false });
            }

            const row = `
                <tr>
                    <td>${studentEmail}</td>
                    <td><span class="status-pill ${rowClass}">${progress}</span></td>
                    <td class="timestamp">${lastPing}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    });
</script>
