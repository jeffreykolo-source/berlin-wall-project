<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard: Live Progress</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f0f2f5; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #34495e; color: white; }
        .status-active { color: #27ae60; font-weight: bold; }
        .progress-pill { background: #3498db; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Berlin Wall: Live Grade Book</h1>
    <p>Watching <strong>130 Students</strong> in real-time...</p>
    
    <table>
        <thead>
            <tr>
                <th>Student Email</th>
                <th>Current Progress</th>
                <th>Last Active</th>
            </tr>
        </thead>
        <tbody id="gradebook-body">
            </tbody>
    </table>
</div>

<script>
    // --- PASTE YOUR SAME CONFIG HERE ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "berlin-wall-f05a8.firebaseapp.com",
        projectId: "berlin-wall-f05a8",
        storageBucket: "berlin-wall-f05a8.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // THIS IS THE MAGIC: It listens for any changes in 'student_progress'
    db.collection("student_progress").orderBy("timestamp", "desc")
      .onSnapshot((snapshot) => {
          const tbody = document.getElementById('gradebook-body');
          tbody.innerHTML = ""; // Clear table for update

          snapshot.forEach((doc) => {
              const data = doc.data();
              const timestamp = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "Just now";
              
              tbody.innerHTML += `
                  <tr>
                      <td>${data.email}</td>
                      <td><span class="progress-pill">Section ${data.lastCompleted} / 10</span></td>
                      <td class="status-active">${timestamp}</td>
                  </tr>
              `;
          });
      });
</script>
</body>
</html>
