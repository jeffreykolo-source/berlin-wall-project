<script>
    // --- FIREBASE CONFIG (Kept as is) ---
    const firebaseConfig = {
        apiKey: "AIzaSyAn1ip5ibEQsagBRaS0U0onKjFXtQMMZuc",
        authDomain: "berlin-wall-f05a8.firebaseapp.com",
        projectId: "berlin-wall-f05a8",
        storageBucket: "berlin-wall-f05a8.firebasestorage.app",
        messagingSenderId: "374515847282",
        appId: "1:374515847282:web:b052c0c218937fae7432eb"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // --- THE REAL-TIME FIX ---
    db.collection("student_progress").onSnapshot((snapshot) => {
        const tableBody = document.getElementById('dashboard-body');
        tableBody.innerHTML = ""; 

        snapshot.forEach((doc) => {
            const data = doc.data();
            
            // 1. Fix Email: Use the 'email' field or the Doc ID
            const studentEmail = data.email || doc.id; 

            // 2. Fix Progress: Use 'lastStep' (e.g., "File 7 - Q4")
            let progress = data.lastStep || "Starting...";
            let rowClass = "";
            
            // Check if they finished
            if (progress.toLowerCase().includes("finish") || progress.toLowerCase().includes("clear")) {
                progress = "ARCHIVE CLEAR ✅";
                rowClass = "complete";
            }

            // 3. Fix Timestamp: Your field is named 'timestamp', not 'lastActive'
            let lastPing = "--:--:--";
            if (data.timestamp) {
                // Firebase timestamp objects use .toDate()
                const date = data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp);
                lastPing = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            // 4. Added Total Answered (since you have the 'questionsAnswered' field)
            const totalQ = data.questionsAnswered || 0;

            // Generate the Row
            const row = `
                <tr>
                    <td><strong>${studentEmail}</strong></td>
                    <td><span class="status-pill ${rowClass}">${progress}</span></td>
                    <td>${totalQ}</td>
                    <td class="timestamp">${lastPing}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    });
</script>
